<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collab Login</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --primary: #3b82f6;
            --text: #0f172a;
            --muted: #64748b;
            --error: #dc2626;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            color: var(--text);
        }

        .card {
            width: min(460px, 94vw);
            background: var(--card);
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
            padding: 2rem;
        }

        .card h1 {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 700;
        }

        .card p.subtitle {
            margin: 0.5rem 0 1.4rem;
            color: var(--muted);
        }

        .form-field {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            color: #0f172a;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16);
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 0.35rem;
            display: none;
        }

        .actions {
            margin-top: 0.35rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .actions a {
            color: var(--primary);
            text-decoration: none;
        }

        .actions a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.76rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.24);
        }

        .help-text {
            text-align: center;
            margin-top: 1rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .help-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        .tab-switch {
            display: flex;
            gap: 0.45rem;
            margin-bottom: 1.4rem;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #eef2ff;
            border: 1px solid #cfe1ff;
        }

        .tab-button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.65rem 0.8rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .tab-button.active {
            background: #3b82f6;
            color: #ffffff;
        }

        .tab-panel.hidden {
            display: none;
        }

        #successMessage {
            color: #16a34a;
            margin-top: 0.65rem;
            font-weight: 600;
            display: none;
        }
    </style>
</head>

<body>
    <div class="card" aria-label="Authentication container">
        <div class="tab-switch" role="tablist" aria-label="Authentication tabs">
            <button type="button" class="tab-button active" id="loginTab" aria-selected="true">Sign in</button>
            <button type="button" class="tab-button" id="signupTab" aria-selected="false">Create account</button>
        </div>

        <section id="loginSection" class="tab-panel" aria-labelledby="loginTab">
            <h1>Welcome back to Collab</h1>
            <p class="subtitle">Sign in to continue collaborating with your team.</p>

            <form id="loginForm" novalidate>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required />
                    <p class="error-msg" id="emailError" aria-live="polite"></p>
                </div>

                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="6" />
                    <p class="error-msg" id="passwordError" aria-live="polite"></p>
                </div>

                <div class="actions">
                    <label><input type="checkbox" id="remember" name="remember" /> Remember me</label>
                    <a href="#" id="forgotPassword">Forgot password?</a>
                </div>

                <button type="submit" class="btn">Sign in</button>
            </form>
        </section>

        <section id="signupSection" class="tab-panel hidden" aria-labelledby="signupTab">
            <h1>Create your Collab account</h1>
            <p class="subtitle">Join now to start collaborating with your team instantly.</p>

            <form id="signupForm" novalidate>
                <div class="form-field">
                    <label for="fullName">Full name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required />
                    <p class="error-msg" id="nameError" aria-live="polite"></p>
                </div>

                <div class="form-field">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" name="signupEmail" placeholder="you@example.com" required />
                    <p class="error-msg" id="signupEmailError" aria-live="polite"></p>
                </div>

                <div class="form-field">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" name="signupPassword" placeholder="Create a password" required minlength="6" />
                    <p class="error-msg" id="signupPasswordError" aria-live="polite"></p>
                </div>

                <div class="form-field">
                    <label for="confirmPassword">Confirm password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required minlength="6" />
                    <p class="error-msg" id="confirmError" aria-live="polite"></p>
                </div>

                <button type="submit" class="btn">Create account</button>
            </form>
        </section>

        <p id="successMessage" role="status"></p>
    </div>

    <script src="Home.js"></script>
</body>

</html>
